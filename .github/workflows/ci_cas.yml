name: Run Cassandra Tests

on:
  workflow_call:
    secrets:
      personaltoken:
        required: true

jobs:

  build:
    name: Build & Test
    runs-on: ubuntu-22.04
    outputs:
      failure_url: ${{ steps.set_failure_url.outputs.failure_url }}

    services:
      scylladb:
        image: scylladb/scylla:5.1.13
        ports:
          - 9042:9042

    steps:
    - name: Checkout and Setup go
      uses: untillpro/ci-action/checkout-and-setup-go@main

    - name: Wait for Scylla CQL
      shell: bash
      run: |
        container="${{ job.services.scylladb.id }}"
        scylla_ip="$(docker inspect \
          --format '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' \
          "$container")"

        echo "Scylla container IP: $scylla_ip"

        for attempt in {1..90}; do
          if docker exec "$container" \
              cqlsh "$scylla_ip" 9042 \
              -e "DESCRIBE KEYSPACES" >/dev/null 2>&1; then
            echo "Scylla CQL is ready"
            exit 0
          fi

          echo "Waiting for Scylla CQL readiness, attempt ${attempt}/90..."
          sleep 1
        done

        echo "::error::Scylla CQL did not become ready"
        docker exec "$container" \
          cqlsh "$scylla_ip" 9042 \
          -e "DESCRIBE KEYSPACES" || true
        docker ps -a --filter "id=$container"
        docker logs "$container"
        exit 1

    - name: Run Cassandra Implementation Tests
      working-directory: pkg/istorage/cas
      run: go test ./... -v -race
      env:
        CASSANDRA_TESTS_ENABLED: true

    - name: Run Cassandra TTLStorage and Elections Tests
      working-directory: pkg/vvm/storage
      run: go test ./... -v -race
      env:
        CASSANDRA_TESTS_ENABLED: true


    - name: Set Failure URL
      if: failure()  # Corrected syntax
      id: set_failure_url
      run: echo "failure_url=https://github.com/voedger/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT

  call-workflow-create-issue:
    needs: build
    if: ${{ failure() }}
    uses: untillpro/ci-action/.github/workflows/create_issue.yml@main
    with:
      repo: 'voedger/voedger'
      assignee: 'host6'
      name: 'Cassandra test failed on'
      body: ${{ needs.build.outputs.failure_url }}
      label: 'prty/blocker'
    secrets:
      personaltoken: ${{ secrets.personaltoken }}  # Match with `workflow_call`
