version: "2"
linters:
  default: all
  disable:
    - wsl_v5
    - wsl
    - wrapcheck
    - wastedassign
    - varnamelen
    - testpackage
    - tagliatelle
    - paralleltest
    - nlreturn
    - nestif
    - mnd
    - lll
    - ireturn
    - interfacebloat
    - inamedparam
    - iface
    - godoclint
    - godot
    - gocognit
    - gochecknoglobals
    - gocyclo
    - funlen
    - funcorder
    - forcetypeassert
    - fatcontext
    - whitespace
    - unqueryvet
    - gomodguard
    - depguard
    - nonamedreturns
    - exhaustive
    - exhaustruct
    - cyclop
    - err113
    - musttag
    - nolintlint
    - noinlineerr
    - maintidx
    - ineffassign
    - errname
    - containedctx
    - godox
    - forbidigo
    - contextcheck
    - thelper
    - dogsled
  settings:
    embeddedstructfieldcheck:
      empty-line: false
    goconst:
      min-len: 20
      ignore-tests: true
    gocritic:
      enable-all: true
      disabled-checks:
        - appendAssign
        - dupArg
        - ifElseChain
        - singleCaseSwitch
        - exitAfterDefer
        - commentFormatting
        - paramTypeCombine
        - importShadow
        - rangeValCopy
        - hugeParam
        - emptyStringTest
        - ptrToRefParam
        - unnecessaryBlock
        - octalLiteral
        - commentedOutCode
        - whyNoLint
        - tooManyResultsChecker
    gosec:
      excludes:
        - G101
        - G601
        - G602
        - G117 # exported fields like "Pwd" matches secret pattern
    misspell:
      ignore-rules:
        - untill
    modernize:
      disable:
        - any
    nilnil:
      checked-types:
        - func
    perfsprint:
      strconcat: false # allow fmt.Sprintf("...%s", x) / fmt.Sprintf("%s...", x) instead of forcing string concatenation
    revive:
      severity: warning
      enable-all-rules: true
      rules:
        - { name: line-length-limit, disabled: true }
        - { name: exported, disabled: true }
        - { name: cognitive-complexity, disabled: true }
        - { name: cyclomatic, disabled: true }
        - { name: function-result-limit, disabled: true }
        - { name: argument-limit, disabled: true }
        - { name: package-directory-mismatch, disabled: true }
        - { name: import-alias-naming, disabled: true }
        - { name: import-shadowing, disabled: true }
        - { name: unchecked-type-assertion, disabled: true }
        - { name: max-public-structs, disabled: true }
        - { name: function-length, disabled: true }
        - { name: time-date, disabled: true }
        - { name: max-control-nesting, disabled: true }
        - { name: unused-receiver, disabled: true }
        - { name: use-any, disabled: true }
        - { name: package-naming, disabled: true }
        - { name: flag-parameter, disabled: true } # denies args like isXXX bool
        - { name: get-return, disabled: true } # denies e.g. Get*() void
        - { name: enforce-switch-style, disabled: true } # demands default clause in switch
        - { name: confusing-naming, disabled: true } # denies e.g. ValidateDocument and validateDocument
        - name: indent-error-flow
          severity: warning
        - name: unused-parameter
          arguments:
            - allowRegex: "^t$" # allow `t` (conventional *testing.T parameter) to be unused
          severity: warning
        - name: add-constant
          arguments:
            - allowFloats: 0.0,0.,1.0,1.,2.0,2.
              allowInts: 0,1,2
              allowStrs: '"","to"'
              maxLitCount: "3"
          severity: warning
    staticcheck:
      checks:
        - all
        - "-QF1008" # possibly dangerous: could remove embedded field ... from selector
    testifylint:
      disable:
        - float-compare
    errcheck:
      exclude-functions:
        - encoding/binary.Write
        - encoding/binary.Read
    recvcheck:
      exclusions:
        # to avoid warnings on both pointer and value receivers, e.g. (qn QName) MarshalJSON() and (qn *QName) UnmarshalJSON
        - "*.MarshalJSON"
        - "*.UnmarshalJSON"
        - "*.MarshalText"
        - "*.UnmarshalText"
        - "*.MarshalXML"
        - "*.UnmarshalXML"
        - "*.MarshalYAML"
        - "*.UnmarshalYAML"
        - "*.MarshalBinary"
        - "*.UnmarshalBinary"
        - "*.Scan"
        - "*.GobDecode"
        - "*.GobEncode"
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gosec
          - revive
          - prealloc
          - unparam
          - noctx
          - dupword
          - contextcheck
          - embeddedstructfieldcheck
          - gosmopolitan
          - dupl
          - makezero
          - goconst # TODO: eliminate this after switch to golangci-lint >= 2.12.2 in ci-action
        path: _test.go
      - linters:
          - gocritic
        text: stringConcatSimplify
        path: _test.go
      - linters:
          - errcheck
        source: 'require\.Panics(?:WithValue)?'
      - linters:
          - revive
        text: "empty-block"
        source: '^\s*for[\s{]' # intentional channel drains like `for range ch {}` are false positives
      - linters:
          - testifylint
        text: (do not use require in http handlers)|(must only be used in the goroutine running the test function)|(use require\.Equal)
      - linters:
          - staticcheck
        text: should not use underscores
      - linters:
          - revive
        text: don't use underscores in Go names
      - linters:
          - prealloc
        path: pkg/vit/
      - linters:
          - revive
        source: '_ "embed"'
      - linters:
          - revive
        text: "prefer not to defer chains of function calls" # setup-and-restore pattern like `defer logger.SetLogLevelWithRestore(...)()`
      - linters:
          - exptostd
        # exptostd rewrites x/exp/maps.Keys/Values to slices.AppendSeq(make(...), ...) / slices.Collect(...);
        # the unsized autofix regresses +34–79% CPU and +300–1300% allocs, and the pre-sized form only adds
        # verbosity for no measurable win — keep x/exp/maps.Keys/Values.
        # see https://github.com/untillpro/air-rsch/blob/main/2606122107-modernize-linter-efficiency-skill/README.md
        text: golang\.org/x/exp/maps\.(Keys|Values)|Import statement.+golang\.org/x/exp/maps
      - linters:
          - modernize
        # mapsloop's maps.Collect rewrite can't pre-size the destination from an iter.Seq2, so it grows the
        # map incrementally: benchmarked +132–159% CPU and +150–175% allocs vs a pre-sized make(map,n)+loop.
        # Only the Collect variant is suppressed; the maps.Copy/Clone/Insert rewrites are kept.
        # see https://github.com/untillpro/air-rsch/blob/main/2606122107-modernize-linter-efficiency-skill/README.md
        text: Replace m\[k\]=v loop with maps\.Collect
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
